name: CI

on:
  push:
    branches: [main, master, '[0-9]+.[0-9]+.[0-9]+', release/**]
  pull_request:
    branches: [main, master, '[0-9]+.[0-9]+.[0-9]+', release/**]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PHP Lint ── syntax check across PHP versions (BLOCKING) ─────────
  php-lint:
    name: PHP Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none

      - name: Check PHP syntax
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            -not -path "./build/*" \
            -not -path "./dist/*" \
            -not -path "./wp-career-board/*" \
            | xargs -P4 php -l

  # ── WPCS ── WordPress Coding Standards (BLOCKING) ───────────────────
  wpcs:
    name: WPCS
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer, cs2pr

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS (WordPress standard)
        run: vendor/bin/phpcs --report=checkstyle --runtime-set ignore_warnings_on_exit 1 . | cs2pr

  # ── PHPStan ── static analysis level 5 with baseline (BLOCKING) ─────
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=2G

  # ── Plugin Check (PCP) ── wordpress.org guideline scan (BLOCKING) ───
  plugin-check:
    name: Plugin Check (PCP)
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wp-career-board

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./wp-career-board
          severity: 7
          exclude-checks: |
            plugin_readme
            late_escaping
            file_type
            i18n_usage

  # ── size-limit ── enforce frontend asset budgets (BLOCKING) ─────────
  size-limit:
    name: size-limit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run size-limit
        run: npx --yes size-limit

  # ── Lighthouse CI ── perf + a11y budgets (manual until wp-env is wired) ─
  # Trigger via workflow_dispatch only. The .lighthouserc.json budgets are
  # active so once a wp-env / playground step runs before this job in a
  # follow-up PR, the assertions begin enforcing on real URLs.
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=.lighthouserc.json || echo "lhci ran"
