# errors. Every entry needs an `eta` (target fix date) so the baseline
# shrinks over time.
#
# Rule: if you add to the baseline, also document in plan/FOLLOWUPS.md
# so the debt is visible at the plan level too.
# ──────────────────────────────────────────────────────────────────────

baseline: []

